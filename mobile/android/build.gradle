// Top-level build configuration for the React Native Android project.
buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        // Use NDK r27 (16 KB support via ANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES)
        // React Native 0.76.5 is tested with r27, while r28 can cause
        // C++ build issues in some prefab headers.
        ndkVersion = "27.3.13750724"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.3.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    configurations.all {
        resolutionStrategy {
            force "androidx.core:core:1.16.0"
            force "androidx.core:core-ktx:1.16.0"
        }
    }
}
