def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    // The root of your project, i.e. where "package.json" lives. Default is '../..'
    root = file("../../")
    // The folder where the react-native NPM package is. Default is ../node_modules/react-native
    reactNativeDir = file("../../node_modules/react-native")
    // The folder where the react-native Codegen package is. Default is ../node_modules/@react-native/codegen
    codegenDir = file("../../node_modules/@react-native/codegen")
    // The cli.js file which is the React Native CLI entrypoint. Default is ../node_modules/react-native/cli.js
    cliFile = file("../../node_modules/react-native/cli.js")

    /* Hermes Commands */
    // The path to the Hermes compiler. By default it is in node_modules.
    hermesCommand = "node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"

    // Bundle JS for debug installs as well so the physical device can launch even if
    // the Metro connection drops or adb reverse is temporarily unavailable.
    debuggableVariants = []

    autolinkLibrariesWithApp()
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.aitutormobile"

    // For AGP < 8.5.1, keep legacy packaging so native libs are compressed
    // and avoid zip alignment install issues on 16 KB page size devices.
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    defaultConfig {
        applicationId "com.aitutormobile"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // Ensure all CMake-based native builds opt in to flexible page sizes
        // so generated .so files are compatible with 16 KB page size devices.
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `gradlew assembleRelease` will generate
            // a signing release APK without defining any secrets.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

def resolveAdbExecutable() {
    def adbName = System.getProperty("os.name").toLowerCase().contains("windows")
        ? "adb.exe"
        : "adb"
    return new File(android.sdkDirectory, "platform-tools/${adbName}")
}

tasks.register("reverseDevPorts") {
    group = "react"
    description = "Expose Metro and backend ports to a USB-connected Android device."

    doLast {
        def adbExecutable = resolveAdbExecutable()
        if (!adbExecutable.exists()) {
            logger.lifecycle("Skipping adb reverse because adb was not found at ${adbExecutable}.")
            return
        }

        def devicesOutput = new ByteArrayOutputStream()
        exec {
            commandLine adbExecutable.absolutePath, "devices"
            standardOutput = devicesOutput
            errorOutput = devicesOutput
            ignoreExitValue true
        }

        def hasConnectedDevice = devicesOutput
            .toString()
            .readLines()
            .any { line -> line ==~ /.+\s+device$/ }

        if (!hasConnectedDevice) {
            logger.lifecycle("Skipping adb reverse because no connected Android device was detected.")
            return
        }

        ["8081", "8000"].each { port ->
            exec {
                commandLine adbExecutable.absolutePath, "reverse", "tcp:${port}", "tcp:${port}"
                ignoreExitValue true
            }
        }
    }
}

tasks.matching { task ->
    task.name == "createBundleDebugJsAndAssets"
}.configureEach {
    // Keep the packaged debug fallback in dev mode so __DEV__ stays true and
    // the app continues using local mobile dev configuration when Metro is unavailable.
    devEnabled.set(true)
    minifyEnabled.set(false)
}

tasks.matching { task ->
    task.name.toLowerCase().startsWith("install") && task.name.endsWith("Debug")
}.configureEach {
    dependsOn("reverseDevPorts")
}
