version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ai_tutor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_tutor
      POSTGRES_PASSWORD: ai_tutor_password
      POSTGRES_DB: ai_tutor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_tutor_backend
    restart: unless-stopped
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Match this with your FastAPI config.DATABASE_URL
      DATABASE_URL: postgresql://ai_tutor:ai_tutor_password@db:5432/ai_tutor_db
      SECRET_KEY: change-this-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-http://localhost:8000}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-AI Tutor App}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-1.5-flash
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      TTS_PROVIDER: ${TTS_PROVIDER:-auto}
      PIPER_TTS_URL: ${PIPER_TTS_URL:-}
      COQUI_TTS_URL: ${COQUI_TTS_URL:-}
      KOKORO_API_URL: ${KOKORO_API_URL:-http://host.docker.internal:8880}
      DID_API_KEY: ${DID_API_KEY:-}
      DID_API_BASE_URL: ${DID_API_BASE_URL:-https://api.d-id.com}
      DID_DEFAULT_VOICE: ${DID_DEFAULT_VOICE:-en-US-JennyNeural}
      DID_VOICE_PROVIDER: ${DID_VOICE_PROVIDER:-microsoft}
      DID_REQUEST_TIMEOUT_SECONDS: ${DID_REQUEST_TIMEOUT_SECONDS:-120}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
      HOST: 0.0.0.0
      PORT: 8000
      # CORS is set to allow all origins so the React Native app can connect
      # without an Origin header. JWT guards all protected routes.
      CORS_ORIGINS: "*"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
      - ./backend/rag_data:/app/rag_data
    ports:
      - "8000:8000"
      # Expose on LAN so Android devices/emulators can reach the API
      # Android emulator: use 10.0.2.2:8000 as the API base URL
      # Physical device: use your machine's LAN IP, e.g. 192.168.x.x:8000

volumes:
  postgres_data:

